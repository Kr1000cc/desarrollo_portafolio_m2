<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="./node_modules/bootstrap-icons/font/bootstrap-icons.css"
    />
    <title>Ferreteria Pellahuen</title>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg bg-primary-subtle border-bottom border-primary shadow"
    >
      <div
        class="container-fluid d-flex flex-wrap align-items-center justify-content-between"
      >
        <div class="d-flex align-items-center col-6 col-lg-3 order-1">
          <button
            class="navbar-toggler me-2"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <h1 class="navbar-brand mb-0 h1">Pellahuen</h1>
        </div>

        <div
          class="d-flex gap-2 justify-content-end col-6 col-lg-3 order-2 order-lg-3"
        >
          <button class="btn btn-outline-primary d-none d-lg-block">
            Inicia Sesión
          </button>
          <button class="btn btn-primary"><i class="bi bi-cart"></i></button>
        </div>

        <div class="col-12 col-lg-6 mt-2 mt-lg-0 order-3 order-lg-2">
          <form class="d-flex justify-content-center" role="search">
            <div class="input-group" style="max-width: 500px; width: 100%">
              <input
                type="text"
                class="form-control"
                placeholder="Buscar en Pellahuen..."
                aria-label="Buscar"
              />
              <button class="btn btn-primary" type="submit">
                <i class="bi bi-search"></i>
              </button>
            </div>
          </form>
        </div>
      </div>
    </nav>
  </body>
</html>
